name: Export Fabric Data to Static JSON

on:
  schedule:
    # 22:30 UTC = 04:00 AM IST. Gives the upstream Fabric Notebook + dbt
    # build (which kicks off at 03:00 AM IST) a full hour of headroom
    # before the export tries to read the gold tables. Previous schedule
    # was 21:45 UTC (03:15 AM IST), which collided with a long dbt run
    # and surfaced as a snapshot-isolation DDL conflict (error 3961) on
    # gold_stock_performance.
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio-website
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ODBC Driver 18
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install Python dependencies
        run: pip install pyodbc msal

      - name: Export Gold tables to JSON
        env:
          # Force unbuffered stdout/stderr so progress prints appear in
          # the live GitHub Actions log instead of being held in Python's
          # 8 KB pipe buffer until the script ends. Without this, a
          # script stuck on a slow query can look completely silent for
          # 20+ minutes even though it's running fine.
          PYTHONUNBUFFERED: '1'
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          FABRIC_SQL_ENDPOINT_P1: ${{ secrets.FABRIC_SQL_ENDPOINT_P1 }}
          FABRIC_SQL_ENDPOINT_P3: ${{ secrets.FABRIC_SQL_ENDPOINT_P3 }}
        run: python -u scripts/export_fabric_to_json.py

      - name: Check file sizes
        run: |
          MAX_SIZE=50000000
          LARGE_FILES=$(find public/static -name "*.json" -size +${MAX_SIZE}c 2>/dev/null)
          if [ -n "$LARGE_FILES" ]; then
            echo "ERROR: Files exceed 50MB limit:"
            echo "$LARGE_FILES" | while read f; do
              SIZE=$(stat --printf="%s" "$f")
              echo "  $f — $(($SIZE / 1024 / 1024))MB"
            done
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/static/energy/ public/static/portfolio/ public/static/data_meta.json
          CHANGES=$(git diff --staged --name-only)
          if [ -z "$CHANGES" ]; then
            echo "No data changes detected"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: refresh static JSON — $TIMESTAMP"
            git push origin main
          fi