name: Export Data to Static JSON
on:
  schedule:
    # 22:15 UTC = 03:45 AM IST. The upstream dbt build runs earlier; this
    # gives it headroom before the export reads the gold tables. (On
    # BigQuery there's no CU contention / snapshot-isolation risk like the
    # old Fabric setup, but we keep a sensible gap anyway.)
    - cron: '15 22 * * *'
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio-website
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install google-cloud-bigquery
      - name: Export Gold tables to JSON
        env:
          PYTHONUNBUFFERED: '1'
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python -u scripts/export_to_json.py
      - name: Check file sizes
        run: |
          MAX_SIZE=50000000
          LARGE_FILES=$(find public/static -name "*.json" -size +${MAX_SIZE}c 2>/dev/null)
          if [ -n "$LARGE_FILES" ]; then
            echo "ERROR: Files exceed 50MB limit:"
            echo "$LARGE_FILES" | while read f; do
              SIZE=$(stat --printf="%s" "$f")
              echo "  $f - $(($SIZE / 1024 / 1024))MB"
            done
            exit 1
          fi
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/static/energy/ public/static/portfolio/ public/static/data_meta.json
          CHANGES=$(git diff --staged --name-only)
          if [ -z "$CHANGES" ]; then
            echo "No data changes detected"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: refresh static JSON - $TIMESTAMP"
            git push origin main
          fi
