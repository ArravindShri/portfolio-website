name: Refresh Crisis Snapshot
# Weekly job that re-queries gold_crisis_analysis and updates
# public/static/energy/crisis.json. On Fabric F4 this query took 15-30 min
# (CU throttling), which is why it was decoupled from the daily export. On
# BigQuery it returns ~75 rows in under a second — the daily export now also
# refreshes crisis.json, so this weekly job is effectively a backstop. Kept
# for the same cadence; see scripts/refresh_crisis.py.
on:
  schedule:
    # 23:30 UTC Saturday = 05:00 AM IST Sunday.
    - cron: '30 23 * * 6'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout portfolio-website
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install google-cloud-bigquery
      - name: Refresh crisis.json from gold_crisis_analysis
        env:
          PYTHONUNBUFFERED: '1'
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python -u scripts/refresh_crisis.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add public/static/energy/crisis.json
          CHANGES=$(git diff --staged --name-only)
          if [ -z "$CHANGES" ]; then
            echo "No crisis.json changes detected"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: refresh crisis snapshot - $TIMESTAMP"
            git push origin main
          fi
